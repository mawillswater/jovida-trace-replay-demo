<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>邯郸周末特种兵 · Jovida 思考与干活过程</title>
<style>
  :root{
    --bg:#F6F2EA; --bg-deep:#EFE9DD; --paper:#FFFFFF;
    --ink:#1B1A18; --ink-soft:#4A4742; --ink-mute:#8E867C;
    --line:#E5DECF; --line-soft:#F0EADB;
    --accent:#C36B3C; --accent-soft:#F2E2D2;
    --sage:#6F8A6A; --sage-soft:#E3ECDD; --gold:#B58C4A;
    --think:#7A5BB5; --think-soft:#EDE5F7;
    --shadow:0 1px 0 rgba(0,0,0,.02),0 6px 16px -10px rgba(40,30,15,.18);
    --r-card:18px; --r-pill:999px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","HarmonyOS Sans","Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.55;letter-spacing:.01em}
  body{padding-bottom:80px}
  img{max-width:100%;display:block;border-radius:12px}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
  ::-webkit-scrollbar{display:none}

  .top{position:sticky;top:0;z-index:30;background:rgba(246,242,234,.96);backdrop-filter:saturate(180%) blur(14px);
    -webkit-backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line-soft)}
  .top-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;color:var(--ink-soft);letter-spacing:.08em}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .meta{font-size:11px;color:var(--ink-mute);font-variant-numeric:tabular-nums}

  /* Process header (replaces tabs) */
  .runner{padding:8px 18px 12px}
  .progressbar{height:4px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:8px}
  .progressbar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:99px;width:0%;transition:width .2s linear}
  .runner-status{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .runner-status .cur{font-weight:600;color:var(--ink)}
  .speed{display:flex;gap:6px;margin-top:10px;align-items:center;flex-wrap:wrap}
  .speed .label{font-size:10px;color:var(--ink-mute);letter-spacing:.08em;font-weight:600;text-transform:uppercase}
  .speed button{font-size:11px;padding:5px 10px;border-radius:99px;background:var(--bg-deep);color:var(--ink-soft);border:1px solid transparent;font-weight:600}
  .speed button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .speed .replay{background:var(--accent-soft);color:var(--accent)}
  .speed .skip{margin-left:auto;background:transparent;color:var(--accent);text-decoration:underline;text-underline-offset:3px}

  .timeline{padding:16px 18px 0;position:relative}
  .timeline::before{content:"";position:absolute;left:34px;top:18px;bottom:18px;width:1.5px;background:var(--line)}
  .step{position:relative;padding-left:38px;margin-bottom:12px;opacity:.35;transform:translateY(4px);transition:opacity .35s,transform .35s}
  .step.active{opacity:1;transform:translateY(0)}
  .step.done{opacity:1}
  .step .bullet{position:absolute;left:26px;top:8px;width:17px;height:17px;border-radius:50%;background:var(--paper);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all .3s}
  .step.active .bullet{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 0 0 4px var(--accent-soft);animation:pulse 1.5s ease-in-out infinite}
  .step.done .bullet{border-color:var(--sage);background:var(--sage);color:#fff}
  .step.done .bullet::after{content:"✓"}
  .step.think.active .bullet{border-color:var(--think);background:var(--think);box-shadow:0 0 0 4px var(--think-soft);animation:pulse-think 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px var(--accent-soft)}50%{box-shadow:0 0 0 10px rgba(195,107,60,0)}}
  @keyframes pulse-think{0%,100%{box-shadow:0 0 0 4px var(--think-soft)}50%{box-shadow:0 0 0 10px rgba(122,91,181,0)}}
  .step-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);overflow:hidden}
  .step.think .step-card{border-color:var(--think-soft)}
  .step.think.active .step-card{box-shadow:0 0 0 1px var(--think-soft),var(--shadow)}
  .step-head{display:flex;align-items:baseline;gap:8px}
  .step-icon{font-size:18px}
  .step-title{font-weight:600;font-size:14.5px;flex:1}
  .step-dur{font-size:11px;color:var(--ink-mute);font-variant-numeric:tabular-nums}
  .step-sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
  .step-detail{margin-top:10px;font-size:13px;color:var(--ink-soft);display:none}
  .step.active .step-detail,.step.done .step-detail{display:block}

  .thinking-stream{font-size:12.5px;color:var(--ink-soft);padding:10px 12px;background:var(--think-soft);border-radius:10px;border-left:2px solid var(--think);line-height:1.7;min-height:60px}
  .thinking-stream .frag{opacity:0;transition:opacity .35s ease-out}
  .thinking-stream .frag.in{opacity:1}
  .thinking-stream .head{color:var(--think);font-weight:600;margin-top:6px;display:block;font-size:13px}
  .thinking-stream .head:first-child{margin-top:0}

  .emit-list{display:flex;flex-direction:column;gap:6px}
  .emit-row{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--bg-deep);border-radius:10px;
    font-family:"SF Mono","Menlo",monospace;font-size:11.5px;color:var(--ink-soft);
    opacity:0;transform:translateX(-8px);transition:opacity .25s,transform .25s}
  .emit-row.in{opacity:1;transform:none}
  .emit-row .arrow{color:var(--accent);font-weight:700;font-size:13px}
  .emit-row .name{color:var(--ink);font-weight:600;background:#fff;padding:1px 6px;border-radius:6px;border:1px solid var(--line)}
  .emit-row .preview{color:var(--ink-mute);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .emit-text{margin-top:8px;padding:10px;background:var(--bg-deep);border-radius:10px;font-size:12.5px;color:var(--ink-soft);white-space:pre-wrap;line-height:1.55}

  .qa-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .qa{padding:9px 11px;background:var(--bg-deep);border-radius:10px}
  .qa .q{font-size:12px;color:var(--ink-mute);margin-bottom:3px}
  .qa .a{font-size:13px;color:var(--ink);font-weight:500}
  .qa .a .pill{display:inline-block;background:var(--paper);border:1px solid var(--line);border-radius:99px;padding:2px 8px;font-size:11px;margin:2px 4px 0 0;color:var(--ink-soft);font-weight:500}
  .tree{font-family:"SF Mono","Menlo",monospace;font-size:11.5px;line-height:1.7;color:var(--ink-soft);background:var(--bg-deep);padding:10px 12px;border-radius:10px;white-space:pre;overflow-x:auto}
  .tree .new{color:var(--accent);font-weight:600}
  .tree .label{color:var(--ink-mute);font-size:10.5px;margin-left:8px;font-weight:400}
  .gen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
  .gen-thumb{aspect-ratio:1/1;background:var(--bg-deep);border-radius:10px;overflow:hidden;position:relative}
  .gen-thumb img{width:100%;height:100%;object-fit:cover;border-radius:0;transition:opacity .4s}
  .gen-thumb .placeholder{position:absolute;inset:0;background:linear-gradient(110deg,var(--bg-deep),#fff,var(--bg-deep));background-size:200% 100%;animation:shimmer 1.5s linear infinite}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .gen-cap{font-size:11px;color:var(--ink-mute);margin-top:6px;text-align:center}
  .search-row{display:flex;gap:8px;overflow-x:auto;padding:6px 0 2px;scroll-snap-type:x mandatory}
  .search-row .item{flex:0 0 60%;scroll-snap-align:start;background:var(--bg-deep);border-radius:10px;overflow:hidden}
  .search-row .item img{width:100%;height:130px;object-fit:cover;border-radius:0}
  .search-row .item .desc{font-size:11px;color:var(--ink-soft);padding:6px 8px;line-height:1.4}
  .search-q{font-size:12px;color:var(--ink-mute);margin-bottom:6px}
  .search-q b{color:var(--ink-soft);background:var(--accent-soft);padding:2px 7px;border-radius:99px;font-size:11px}

  .write-list{display:flex;flex-direction:column;gap:6px}
  .write-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg-deep);border-radius:8px;font-family:"SF Mono","Menlo",monospace;font-size:11.5px;color:var(--ink-soft)}
  .write-row .new{color:var(--accent)}
  .write-row .tag{margin-left:auto;font-size:10px;background:#fff;border:1px solid var(--line);padding:2px 6px;border-radius:99px;color:var(--ink-mute);font-family:-apple-system,sans-serif}
  .remind-row{display:flex;align-items:center;gap:10px;padding:12px;background:var(--accent-soft);border-radius:12px}
  .remind-row .when{margin-left:auto;font-size:11px;color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums}
  .validate-row{display:flex;align-items:center;gap:10px;padding:11px;background:var(--sage-soft);border-radius:10px;font-size:13px;color:#3F5B3C;font-weight:500}
  .final-text{font-size:13.5px;background:var(--bg-deep);padding:12px;border-radius:10px;color:var(--ink-soft);white-space:pre-wrap;line-height:1.6}

  .group-head{padding:18px 18px 4px;font-size:11px;color:var(--ink-mute);letter-spacing:.12em;font-weight:600;text-transform:uppercase;display:flex;align-items:baseline;gap:8px}
  .group-head .num{color:var(--accent)}

  /* === Final cards (appended at bottom of timeline) === */
  .final-hero{margin:28px 18px 0;padding:18px 18px 14px;background:linear-gradient(180deg,#fff 0%,var(--accent-soft) 130%);border:1px solid var(--line);border-radius:var(--r-card);position:relative;overflow:hidden}
  .final-hero::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
  .final-hero .stamp{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:var(--r-pill);background:var(--sage);color:#fff;font-size:11px;font-weight:600;letter-spacing:.05em}
  .final-hero h1{margin:10px 0 6px;font-size:24px;line-height:1.2;font-weight:600;letter-spacing:-.01em}
  .final-hero .lead{color:var(--ink-soft);font-size:13.5px;margin:0 0 10px}
  .final-hero .thought{font-size:14px}
  .final-hero .thought b{color:var(--accent);font-weight:600}

  section.bucket{padding:18px 18px 4px}
  .bucket-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
  .bucket-head .num{color:var(--ink-mute);font-size:11px;letter-spacing:.1em;font-weight:600;font-feature-settings:"tnum"}
  .bucket-head h2{margin:0;font-size:15px;font-weight:600;letter-spacing:.02em}
  .bucket-head .sub{margin-left:auto;font-size:11px;color:var(--ink-mute)}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-card);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
  .card.empty{background:repeating-linear-gradient(135deg,#fff,#fff 6px,#fafaf5 6px,#fafaf5 12px);color:var(--ink-mute);font-size:13px;text-align:center;padding:18px}
  .card-img{margin:-14px -14px 12px;border-radius:var(--r-card) var(--r-card) 0 0;overflow:hidden;aspect-ratio:16/9;background:var(--bg-deep)}
  .card-img img{width:100%;height:100%;object-fit:cover;border-radius:0}
  .card-title{font-size:16px;font-weight:600;margin:0 0 4px;letter-spacing:.01em}
  .card-desc{font-size:13.5px;color:var(--ink-soft);margin:0}
  .welcome{font-size:13px;color:var(--ink-soft);margin:4px 0 12px;padding-left:10px;border-left:2px solid var(--accent-soft)}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--r-pill);font-size:11px;letter-spacing:.04em;font-weight:600;text-transform:uppercase}
  .chip.todo{background:var(--sage-soft);color:#3F5B3C}
  .chip.read{background:#E7E4F3;color:#54498A}
  .chip.chat{background:#FBE9E0;color:#A04F2E}
  .chip.did{background:#FAEFC9;color:#6F5717}
  .child{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .child .todo-row{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;background:var(--bg-deep);border-radius:12px}
  .child .todo-row .box{width:18px;height:18px;border-radius:6px;border:1.5px solid #BFB6A4;flex-shrink:0;margin-top:2px;background:#fff}
  .child .todo-row .t{font-size:14px;font-weight:500}
  .child .todo-row .s{font-size:12px;color:var(--ink-mute);margin-top:2px}
  .child .text-card{padding:11px 12px;background:var(--bg-deep);border-radius:12px}
  .child .text-card .t{font-size:14px;font-weight:600;margin-bottom:2px}
  .child .text-card .d{font-size:13px;color:var(--ink-soft)}
  .child .photo-card{border-radius:12px;overflow:hidden;background:var(--bg-deep);aspect-ratio:16/10;position:relative}
  .child .photo-card img{width:100%;height:100%;object-fit:cover;border-radius:0}
  .child .photo-card .cap{position:absolute;left:0;right:0;bottom:0;font-size:11px;color:#fff;background:linear-gradient(transparent,rgba(0,0,0,.55));padding:14px 10px 6px;text-align:center}
  .composable{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:10px;display:flex;flex-direction:column;gap:8px}
  .footer-pill{margin:16px 18px 0;padding:12px 14px;display:flex;gap:10px;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:14px;font-size:13px}
  .footer-pill .icon{font-size:18px}
  .footer-meta{margin:24px 18px 0;font-size:11px;color:var(--ink-mute);text-align:center;letter-spacing:.04em}

  /* Divider before final block */
  .deliver-divider{margin:30px 18px 0;border-top:1px dashed var(--line);padding-top:18px;text-align:center;font-size:11px;color:var(--ink-mute);letter-spacing:.18em;font-weight:600}
  .deliver-divider span{background:var(--bg);padding:0 12px;position:relative;top:-22px}

  /* === Desktop phone-frame ============================================ */
  @media (min-width: 520px){
    html{background:#1F1B16;background-image:radial-gradient(circle at 20% 0%,rgba(195,107,60,.10),transparent 50%),radial-gradient(circle at 80% 100%,rgba(122,91,181,.08),transparent 55%);min-height:100vh}
    body{
      max-width:412px;margin:24px auto;background:var(--bg);
      border-radius:44px;border:1px solid #3A332B;
      box-shadow:
        0 0 0 12px #28231D,
        0 0 0 13px #4A4137,
        0 38px 80px -22px rgba(0,0,0,.55),
        0 12px 28px -10px rgba(0,0,0,.4);
      overflow:hidden;position:relative;min-height:780px;
      padding-bottom:30px;
    }
    /* notch */
    body::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
      width:124px;height:28px;background:#1F1B16;border-radius:0 0 18px 18px;z-index:50;pointer-events:none}
    /* status-bar spacer */
    .top{padding-top:14px;border-radius:0}
    .top::before{content:"";display:block;height:18px;width:100%}
    /* sticky positions should stick to body top, not viewport top — already does */
    /* let inner content keep its padding */
  }
  @media (min-width: 520px) and (max-height: 900px){
    body{margin-top:12px;margin-bottom:12px}
  }

</style>
</head>
<body>

<div class="top">
  <div class="top-row">
    <div class="brand"><span class="dot"></span> JOVIDA · 思考与干活过程</div>
    <div class="meta">Desire #2891 · 258s</div>
  </div>
  <div class="runner">
    <div class="progressbar"><div class="fill" id="pfill"></div></div>
    <div class="runner-status">
      <span class="cur" id="pcur">准备开始…</span>
      <span id="prem">258 s</span>
    </div>
    <div class="speed">
      <span class="label">速度</span>
      <button data-sp="1">1×</button>
      <button data-sp="4" class="on">4×</button>
      <button data-sp="16">16×</button>
      <button class="replay" id="replay">↻ 重播</button>
      <button class="skip" id="skip">跳到结果 ↓</button>
    </div>
  </div>
</div>

<div class="timeline" id="timeline"></div>

<!-- Final deliverable appears here when playback ends (or skip is clicked) -->
<div id="deliver">
  <div class="deliver-divider"><span>FINAL · 最终成品</span></div>
  <div class="final-hero">
    <span class="stamp">✓ 已生成</span>
    <h1>邯郸周末特种兵</h1>
    <p class="lead">北京出发旅行规划</p>
    <div class="thought"><b>active_thought</b> · 准备好行囊，开启邯郸周末特种兵之旅！</div>
  </div>
  <div id="result-sections"></div>
  <div class="footer-pill"><span class="icon">⏰</span><div><b>已加入提醒：</b>邯郸周末特种兵 | 出发前准备与早睡提醒 (chat)<div style="font-size:11px;color:var(--ink-mute);margin-top:2px">2026-05-15T20:00:00+08:00</div></div></div>
  <div class="footer-meta">由 Jovida 在 258 秒内生成 · 共 21 个步骤</div>

<script>
const DATA = {"desire_id": 2891, "desire_title": "邯郸周末特种兵", "desire_description": "北京出发旅行规划", "scaffold_writes": [{"file_path": "/projects/handan_weekend_trip/meta.json", "content": "{\n  \"desire_id\": 2891,\n  \"goal_name\": \"邯郸周末特种兵\",\n  \"active_thought\": \"\"\n}", "duration_ms": 42}, {"file_path": "/projects/handan_weekend_trip/PROJECT.md", "content": "# 邯郸周末特种兵 (Handan Weekend Trip)\n\n## 业务定位\n本项目用于管理用户周末前往邯郸的“特种兵式”高强度旅行计划。核心目标是提供紧凑的行程安排、清晰的预算明细以及行前准备清单，确保用户在有限的时间内高效打卡战国/古赵文化历史考古景点（如响堂山石窟等），并顺利完成自驾游。\n\n## 用户输入路由\n| 用户表达样例 | section | 操作 |\n| --- | --- | --- |\n| “帮我把响堂山石窟加到周六上午” | itinerary | 更新行程卡片，调整时间安排 |\n| “我决定不住经济型了，换个好点的酒店” | budget_breakdown | 更新住宿预算，重新计算总费用 |\n| “提醒我带上充电宝” | pre_departure_checklist | 追加一条 todo_card |\n| “我到了，接下来去哪” | daily_actions | 触发到达后的打卡或下一步指引 |\n\n## Section 目录\n1. **Daily Actions** (`/projects/handan_weekend_trip/data/daily_actions`)\n   - 角色：每日核心行动指引（如行前提醒、行程中打卡、阅读景点背景）。\n   - 数据形状：`daily_action` 数组。\n2. **Itinerary** (`/projects/handan_weekend_trip/data/itinerary`)\n   - 角色：按天划分的详细行程表。\n   - 数据形状：`composable_card` 数组（包含 text_card 和 photo_card）。\n3. **Budget Breakdown** (`/projects/handan_weekend_trip/data/budget_breakdown`)\n   - 角色：交通、住宿、餐饮、门票等预算明细。\n   - 数据形状：`composable_card` 数组（包含 number_card, text_card, photo_card）。\n4. **Pre-departure Checklist** (`/projects/handan_weekend_trip/data/pre_departure_checklist`)\n   - 角色：行前准备物品清单。\n   - 数据形状：`todo_card` 数组。\n\n## 各 Section 业务规则\n- **Daily Actions**: \n  - 必须包含行前48小时提醒、到达后确认、行程中关键节点打卡。\n  - 避免重复的 `image_url`。\n- **Itinerary**: \n  - 每次用户调整景点或时间，需重新排序并更新对应的卡片。\n  - 必须包含具体的景点名称、建议停留时间和餐饮安排。\n- **Budget Breakdown**: \n  - 预算需分类明确（交通、住宿、餐饮、活动）。\n  - 当用户更改出行方式或住宿标准时，需同步更新金额。\n- **Pre-departure Checklist**: \n  - 默认包含自驾必备物品（如驾驶证、车充等）。\n  - 用户可随时追加或勾选完成。\n\n## 跨 Section 工作流\n- 当用户在 `Itinerary` 中新增了一个需要门票的景点时，必须同步在 `Budget Breakdown` 中增加相应的门票预算。\n- 当用户完成 `Pre-departure Checklist` 中的所有关键项后，可在 `Daily Actions` 中触发“准备出发”的确认。\n\n## 不变量\n- **图片来源限制**：所有 `image_url`（包括 `photo_card.url` 和 `daily_action.image_url`）必须来自用户提供的图片、磁盘上已有的资源值，或当前运行中成功的图片/资源生成工具（如 `image_search`, `image_gen`）。严禁凭空捏造 URL。\n- **Daily Action 图标**：`daily_action.image_url` 必须是具体的 3D 风格图标，若需生成，必须使用规定的 Prompt 模板。\n- **资源引用**：若使用 `place_card`，必须先调用 `recommend_google_places` 获取真实的资源 ID。\n\n## 典型操作场景\n- **场景**：用户说“帮我查一下响堂山石窟的门票多少钱，加到预算里”。\n  - **操作**：调用搜索工具查询门票价格，更新 `budget_breakdown` 中的门票卡片，并可能在 `itinerary` 中补充景点信息。\n- **场景**：用户说“我周五晚上就出发”。\n  - **操作**：更新 `itinerary` 增加周五晚的行程，更新 `budget_breakdown` 增加一晚住宿，调整 `daily_actions` 的提醒时间。", "duration_ms": 40}, {"file_path": "/projects/handan_weekend_trip/data/daily_actions/schema.json", "content": "{\n  \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n  \"type\": \"object\",\n  \"required\": [\"title\", \"definition\", \"sort_order\", \"cards\"],\n  \"additionalProperties\": false,\n  \"properties\": {\n    \"title\": { \"type\": \"string\" },\n    \"subtitle\": { \"type\": \"string\" },\n    \"definition\": { \"type\": \"string\" },\n    \"sort_order\": { \"type\": \"integer\" },\n    \"cards\": {\n      \"type\": \"array\",\n      \"items\": {\n        \"type\": \"object\",\n        \"required\": [\"type\", \"daily_action\"],\n        \"additionalProperties\": false,\n        \"properties\": {\n          \"type\": { \"const\": \"daily_action\" },\n          \"daily_action\": {\n            \"type\": \"object\",\n            \"required\": [\"title\", \"image_url\", \"action_type\", \"welcome_text\", \"cards\"],\n            \"additionalProperties\": false,\n            \"allOf\": [\n              {\n                \"if\": { \"properties\": { \"action_type\": { \"const\": \"chat\" } }, \"required\": [\"action_type\"] },\n                \"then\": { \"required\": [\"chat_conditions\"], \"properties\": { \"cards\": { \"maxItems\": 0 } } }\n              },\n              {\n                \"if\": { \"properties\": { \"action_type\": { \"enum\": [\"read\", \"todo\", \"i_did_it\"] } }, \"required\": [\"action_type\"] },\n 。\n  - 用户可随时追加或勾选完成。\n\n## 跨 Section 工作流\n- 当用户在 `Itinerary` 中新增了一个需要门票的景点时，必须同步在 `Budget Breakdown` 中增加相应的门票预算。\n- 当用户完成 `Pre-departure Checklist` 中的所有关键项后，可在 `Daily Actions` 中触发“准备出发”的确认。\n\n## 不变量\n- **图片来源限制**：所有 `image_url`（包括 `photo_card.url` 和 `daily_action.image_url`）必须来自用户提供的图片、磁盘上已有的资源值，或当前运行中成功的图片/资源生成工具（如 `image_search`, `image_gen`）。严禁凭空捏造 URL。\n- **Daily Action 图标**：`daily_action.image_url` 必须是具体的 3D 风格图标，若需生成，必须使用规定的 Prompt 模板。\n- **资源引用**：若使用 `place_card`，必须先调用 `recommend_google_places` 获取真实的资源 ID。\n\n## 典型操作场景\n- **场景**：用户说“帮我查一下响堂山石窟的门票多少钱，加到预算里”。\n  - **操作**：调用搜索工具查询门票价格，更新 `budget_breakdown` 中的门票卡片，并可能在 `itinerary` 中补充景点信息。\n- **场景**：用户说“我周五晚上就出发”。\n  - **操作**：更新 `itinerary` 增加周五晚的行程，更新 `budget_breakdown` 增加一晚住宿，调整 `daily_actions` 的提醒时间。", "duration_ms": 40}, {"file_path": "/projects/handan_weekend_trip/data/daily_actions/schema.json", "content": "{\n  \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n  \"type\": \"object\",\n  \"required\": [\"title\", \"definition\", \"sort_order\", \"cards\"],\n  \"additionalProperties\": false,\n  \"properties\": {\n    \"title\": { \"type\": \"string\" },\n    \"subtitle\": { \"type\": \"string\" },\n    \"definition\": { \"type\": \"string\" },\n    \"sort_order\": { \"type\": \"integer\" },\n    \"cards\": {\n      \"type\": \"array\",\n      \"items\": {\n        \"type\": \"object\",\n        \"required\": [\"type\", \"daily_action\"],\n        \"additionalProperties\": false,\n        \"properties\": {\n          \"type\": { \"const\": \"daily_action\" },\n          \"daily_action\": {\n            \"type\": \"object\",\n            \"required\": [\"title\", \"image_url\", \"action_type\", \"welcome_text\", \"cards\"],\n            \"additionalProperties\": false,\n            \"allOf\": [\n              {\n                \"if\": { \"properties\": { \"action_type\": { \"const\": \"chat\" } }, \"required\": [\"action_type\"] },\n                \"then\": { \"required\": [\"chat_conditions\"], \   ordered.forEach(([k,sec],i)=>{
    const cn = sec.cards.length;
    h+=`<section class="bucket"><div class="bucket-head"><span class="num">SECTION 0${i+1}</span><h2>${esc(sec.title||k)}</h2><span class="sub">${cn?`${cn} 张卡片`:'未填充'}</span></div>`;
    if(cn===0) h+=`<div class="card empty">本次未生成内容（仅创建了 schema 骨架）</div>`;
    else h += sec.cards.map(renderTopCard).join('');
    h+=`</section>`;
  });
  $('result-sections').innerHTML = h;
}

// ===== Timeline =====
let SPEED = 4, runner = null, curIdx = -1, subAnims = [];
const GROUPS = {scaffold:'阶段 1 · 搭脚手架', dispatch:'阶段 2 · 主线决策', content:'阶段 3 · 生成内容'};

function renderTimeline(){
  let h='', lastG=null;
  DATA.steps.forEach((st,i)=>{
    if(st.group!==lastG){const gi=Object.keys(GROUPS).indexOf(st.group)+1;h+=`<div class="group-head"><span class="num">PHASE 0${gi}</span> · ${esc(GROUPS[st.group]||st.group)}</div>`;lastG=st.group}
    const cls = st.payload?.type==='phase_think'?'step think':'step';
    h+=`<div class="${cls}" id="st${i}"><div class="bullet"></div><div class="step-card"><div class="step-head"><span class="step-icon">${st.icon}</span><span class="step-title">${esc(st.label)}</span><span class="step-dur">${fmtDur(st.duration_ms)}</span></div><div class="step-sub">${esc(st.sublabel)}</div><div class="step-detail" id="dt${i}">${renderDetailShell(st,i)}</div></div></div>`;
  });
  $('timeline').innerHTML = h;
}

function renderDetailShell(st, i){
  const p = st.payload||{}, t = p.type;
  if(t==='phase_think'){
    return `<div class="thinking-stream" id="th${i}">${splitThinking(p.thinking||'').map((f,k)=>`<span class="frag" data-k="${k}">${f.html}</span>`).join('')}</div>`;
  }
  if(t==='phase_emit'){
    const rows = (p.tool_calls||[]).map((c,k)=>`<div class="emit-row" data-k="${k}"><span class="arrow">▸</span><span class="name">${esc(c.name)}</span><span class="preview">${esc(c.args_preview||'')}</span></div>`).join('');
    return `<div class="emit-list" id="em${i}">${rows}</div>${p.text?`<div class="emit-text">${esc(p.text)}</div>`:''}`;
  }
  if(t==='phase_quick'){
    let h='';
    if(p.thinking) h += `<div class="thinking-stream" style="background:var(--bg-deep);border-color:var(--line);color:var(--ink-mute)">${esc(p.thinking.slice(0,200))}</div>`;
    if(p.tool_calls?.length) h += `<div class="emit-list" style="margin-top:8px">${p.tool_calls.map(c=>`<div class="emit-row in"><span class="arrow">▸</span><span class="name">${esc(c.name)}</span><span class="preview">${esc(c.args_preview||'')}</span></div>`).join('')}</div>`;
    if(p.text) h += `<div class="emit-text" style="margin-top:8px">${esc(p.text)}</div>`;
    return h;
  }
  if(t==='goal_core'){
    const g = p.goal||{};
    const qa = (g.qa_snapshot||[]).map(q=>{
      const a = q.answer||{}; let aH='';
      if(a.text) aH=esc(a.text);
      if(a.labels?.length) aH=(aH?aH+' ':'')+a.labels.map(l=>`<span class="pill">${esc(l)}</span>`).join('');
      return `<div class="qa"><div class="q">${esc(q.title||'')}</div><div class="a">${aH||'—'}</div></div>`;
    }).join('');
    return `<div style="margin-bottom:8px;color:var(--ink);font-weight:600;font-size:14px">${esc(g.desire_title||'')}</div><div style="color:var(--ink-mute);font-size:12px;margin-bottom:8px">${esc(g.desire_description||'')}</div><div class="qa-list">${qa}</div>`;
  }
  if(t==='template_load'){
    const list = (p.existing_projects||[]).map(x=>`📁 ${esc(x)}`).join('\n');
    return `<div class="tree">读取契约：/skills/bootstrap-goal/meta-schema.json\n扫描已有项目：\n${list||'(无)'}\n<span class="new">→ 未发现重复，将新建</span></div>`;
  }
  if(t==='scaffold_writes') return `<div class="tree">${renderTree(p.writes||[])}</div>`;
  if(t==='schema_reads') return `<div class="write-list">${(p.reads||[]).map(r=>`<div class="write-row">📑 ${esc(r.file_path)}<span class="tag">read</span></div>`).join('')}</div>`;
  if(t==='image_gens'){
    const items = (p.items||[]).map(it=>{const cap=extractIconName(it.prompt);return `<div><div class="gen-thumb"><span class="placeholder"></span><img loading="lazy" src="${esc(it.url||'')}" onload="this.previousElementSibling.style.display='none'"></div><div class="gen-cap">${esc(cap)}</div></div>`}).join('');
    return `<div style="color:var(--ink-mute);font-size:11px;margin-bottom:6px">用 <b style="color:var(--ink-soft)">Imagen · 3D isometric</b> 风格</div><div class="gen-grid">${items}</div>`;
  }
  if(t==='image_searches') return (p.items||[]).map(g=>{const imgs=(g.images||[]).map(im=>`<div class="item"><img loading="lazy" src="${esc(im.url||'')}" referrerpolicy="no-referrer"><div class="desc">${esc((im.caption||'').slice(0,60))}</div></div>`).join('');return `<div style="margin-bottom:10px"><div class="search-q">搜索 <b>${esc(g.query||'')}</b></div><div class="search-row">${imgs}</div></div>`}).join('');
  if(t==='content_writes') return `<div class="write-list">${(p.writes||[]).map(w=>{let label='';if(w.file_path.endsWith('section.json')){try{const s=JSON.parse(w.content);label=`<span class="tag">${(s.cards||[]).length} cards</span>`}catch{label='<span class="tag">json</span>'}}else if(w.file_path.endsWith('meta.json'))label='<span class="tag">meta</span>';return `<div class="write-row"><span class="new">●</span> ${esc(w.file_path)}${label}</div>`}).join('')}</div>`;
  if(t==='remind'){const info=p.info||{};return `<div class="remind-row"><span style="font-size:18px">⏰</span><div><div style="font-weight:600;font-size:13px">${esc(info.args?.title||'提醒')}</div><div style="font-size:11px;color:var(--ink-mute);margin-top:2px">${esc(info.result||'')}</div></div><span class="when">${fmtDue(info.args?.due_at)}</span></div>`}
  if(t==='validate') return `<div class="validate-row">✓ Schema 校验通过</div>`;
  if(t==='goal_core_refresh') return `<div style="color:var(--ink-mute);font-size:12px">复用上一步读出的 Desire 数据。</div>`;
  return '';
}

function startSubAnim(step, i, realDur){
  clearSubAnims();
  const p = step.payload||{}, t = p.type;
  if(t==='phase_think'){
    const el = $('th'+i); if(!el) return;
    const frags = el.querySelectorAll('.frag');
    const slice = Math.max(120, realDur / Math.max(1,frags.length));
    frags.forEach((f,k)=>{subAnims.push(setTimeout(()=>f.classList.add('in'), k*slice*0.85))});
  } else if(t==='phase_emit'){
    const el = $('em'+i); if(!el) return;
    const rows = el.querySelectorAll('.emit-row');
    const slice = Math.max(140, realDur / Math.max(1,rows.length));
    rows.forEach((r,k)=>{subAnims.push(setTimeout(()=>r.classList.add('in'), k*slice*0.9))});
  }
}
function clearSubAnims(){subAnims.forEach(clearTimeout);subAnims=[]}

function splitThinking(t){
  if(!t) return [{html:'<i>（无 thinking）</i>'}];
  const out = []; const re = /\*\*([^*]+)\*\*([\s\S]*?)(?=\*\*|$)/g; let m, found=false;
  while((m=re.exec(t))!==null){found=true;const head=m[1].trim(),body=m[2].trim().replace(/\n+/g,' ');out.push({html:`<span class="head">▸ ${esc(head)}</span>${body?esc(body):''}`})}
  if(!found){t.split(/(?<=[.。!?！？])\s+/).filter(Boolean).slice(0,6).forEach(s=>out.push({html:esc(s.trim())}))}
  if(out.length>6) out.length=6;
  return out;
}
function renderTree(writes){
  const root={}; writes.forEach(w=>{const parts=w.file_path.split('/').filter(Boolean);let cur=root;parts.forEach((p,i)=>{if(!cur[p])cur[p]={__children:{},__label:i===parts.length-1?labelForFile(w,parts):''};cur=cur[p].__children})});
  let lines=[];
  function walk(node,prefix){const keys=Object.keys(node);keys.forEach((k,i)=>{const isLast=i===keys.length-1,v=node[k],isFile=Object.keys(v.__children).length===0,icon=isFile?'📄':'📁';lines.push(`${prefix}${isLast?'└── ':'├── '}<span class="new">${icon} ${esc(k)}</span>${v.__label?`<span class="label">${esc(v.__label)}</span>`:''}`);if(!isFile)walk(v.__children,prefix+(isLast?'    ':'│   '))})}
  walk(root,''); return lines.join('\n');
}
function labelForFile(w,parts){const fn=parts[parts.length-1];if(fn==='meta.json')return 'desire_id / goal_name';if(fn==='PROJECT.md')return '项目说明与路由';if(fn==='schema.json')return 'JSON Schema 契约';if(fn==='section.json'){try{const s=JSON.parse(w.content||'{}');return s.title||'空 cards: []'}catch{return ''}};return ''}
function extractIconName(prompt){if(!prompt)return '';const m=prompt.match(/icon of ([^,]+)/i);if(!m)return prompt.slice(0,40);let s=m[1].trim();const dict={'car keys and a small suitcase':'车钥匙 + 行李箱','an ancient stone Buddha head carving':'古石佛头雕像','a traditional Chinese city gate':'古城门','a trash bin with a crossed-out cigarette':'戒烟·废弃烟盒','a sugar-free mint tin and a stress ball':'无糖薄荷糖 + 解压球','a chat bubble with a wind symbol for deep breathing':'深呼吸·对话气泡','a glowing lung with a fresh leaf':'清新肺叶','an open book with a glowing quote mark':'金句·打开的书'};return dict[s]||s}

// ---------- Playback ----------
function totalMs(){return DATA.steps.reduce((s,x)=>s+x.duration_ms,0)}
function elapsedMs(idx){return DATA.steps.slice(0,idx).reduce((s,x)=>s+x.duration_ms,0)}

function startProcess(){
  clearSubAnims(); curIdx = -1;
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active','done'));
  document.querySelectorAll('.thinking-stream .frag').forEach(f=>f.classList.remove('in'));
  document.querySelectorAll('.emit-row').forEach(r=>r.classList.remove('in'));
  $('pfill').style.width='0%';
  if(runner){clearTimeout(runner)}
  // scroll back up to start
  window.scrollTo({top:0,behavior:'smooth'});
  playNext();
}

function playNext(){
  if(curIdx>=0){const prev=$('st'+curIdx);if(prev){prev.classList.remove('active');prev.classList.add('done')}}
  curIdx++;
  if(curIdx>=DATA.steps.length){
    $('pcur').textContent='✓ 全部完成'; $('prem').textContent='0s'; $('pfill').style.width='100%';
    // smoothly scroll the deliverable into view
    setTimeout(()=>$('deliver').scrollIntoView({behavior:'smooth',block:'start'}), 400);
    return;
  }
  const st = DATA.steps[curIdx], el = $('st'+curIdx);
  el.classList.add('active');
  setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'center'}), 60);
  $('pcur').textContent = st.icon+' '+st.label;
  const tot = totalMs(), start = elapsedMs(curIdx), dur = st.duration_ms;
  const realDur = Math.max(280, dur/SPEED);
  startSubAnim(st, curIdx, realDur);
  const t0 = performance.now();
  function tick(){
    if(parseInt(el.id.slice(2))!==curIdx) return;
    const ratio = Math.min(1,(performance.now()-t0)/realDur);
    $('pfill').style.width = ((start+dur*ratio)/tot*100).toFixed(2)+'%';
    $('prem').textContent = Math.max(0, Math.round((tot-(start+dur*ratio))/SPEED/1000))+'s';
    if(ratio<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  runner = setTimeout(playNext, realDur);
}

function jumpToResult(){
  if(runner){clearTimeout(runner);runner=null}
  clearSubAnims();
  document.querySelectorAll('.step').forEach(s=>{s.classList.remove('active');s.classList.add('done')});
  document.querySelectorAll('.thinking-stream .frag').forEach(f=>f.classList.add('in'));
  document.querySelectorAll('.emit-row').forEach(r=>r.classList.add('in'));
  $('pfill').style.width='100%';$('pcur').textContent='✓ 全部完成';$('prem').textContent='0s';
  setTimeout(()=>$('deliver').scrollIntoView({behavior:'smooth',block:'start'}), 80);
}

// init
renderResult(); renderTimeline();
$('skip').onclick = jumpToResult;
$('replay').onclick = ()=>startProcess();
document.querySelectorAll('.speed [data-sp]').forEach(b=>{b.onclick=()=>{SPEED=parseInt(b.dataset.sp);document.querySelectorAll('.speed [data-sp]').forEach(x=>x.classList.toggle('on',x===b))}});

// autoplay on load
startProcess();
</script>
